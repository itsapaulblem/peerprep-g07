services:
  api-gateway:
    build: .
    image: api-gateway
    container_name: api-gateway
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - USER_SERVICE_URL=http://user-service:3000
      - QUESTION_SERVICE_URL=http://peerprep-question-service:3000
      - JWT_SECRET=RandomKeyForJWT
    networks:
      - peerprep-network

networks:
  peerprep-network:
    name: peerprep-network
    external: true
